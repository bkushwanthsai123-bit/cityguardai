# Smart City - Illegal Garbage Dumping Detection
# YOLOv8 dataset config. Class index order is FIXED and must match
# app/detector.py and the shared CONTRACT.md. Do not reorder.
#
# This file is regenerated by ml/prepare_data.py after a data split,
# but the `names` list is canonical and never changes.

path: data            # dataset root, relative to this file (ml/)
train: train/images
val: val/images
test: test/images

# 5 canonical waste classes (fixed index order)
names:
  0: Glass
  1: Metal
  2: Paper
  3: Plastic
  4: Waste

nc: 5
